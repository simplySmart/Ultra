name: Anime Release Indexer

on:
  schedule:
    - cron: "*/30 * * * *" # Runs every 30 minutes
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  update-database:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to push data to gh-pages

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install

      - name: Run Indexer Worker
        run: node scripts/worker.js

      - name: Deploy Database to gh-pages Branch
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./db
          publish_branch: gh-pages
          commit_message: "Auto-update: Anime Release Database"
