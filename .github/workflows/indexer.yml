name: Anime Release Indexer

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main code
        uses: actions/checkout@v4

      - name: Checkout database history
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: db-cache
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Restore Database to Workspace
        run: |
          # Safely copy the existing database into the worker's environment before it runs
          cp -r db-cache/anime ./anime || true
          cp -r db-cache/latest ./latest || true

      - name: Run Indexer Engine
        run: node scripts/worker.js

      - name: Save and Push Updated Database
        run: |
          cd db-cache
          rm -rf anime latest
          cp -r ../anime ./anime || true
          cp -r ../latest ./latest || true
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Automated backend update" || echo "No changes to commit"
          git push origin gh-pages
